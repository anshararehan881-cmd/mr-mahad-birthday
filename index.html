<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Happy Birthday MR MAHAD 💗</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Arial',sans-serif;
}

body{
    height:100vh;
    background:linear-gradient(135deg,#000000,#3b0010,#ff4d6d);
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
}

.container{
    text-align:center;
    animation:zoom 2s ease;
    z-index:2;
}

h1{
    font-size:55px;
    animation:glow 2s infinite alternate;
}

h2{
    font-size:45px;
    margin:20px;
}

p{
    font-size:22px;
    line-height:1.6;
}

.line{
    margin-top:20px;
    font-size:18px;
}

@keyframes zoom{
    from{
        opacity:0;
        transform:scale(.5);
    }
    to{
        opacity:1;
        transform:scale(1);
    }
}

@keyframes glow{
    from{
        text-shadow:0 0 10px #fff;
    }
    to{
        text-shadow:0 0 30px #ff99aa;
    }
}

.heart{
    position:absolute;
    bottom:-50px;
    font-size:35px;
    animation:rise 7s linear infinite;
}

@keyframes rise{
    0%{
        transform:translateY(0);
        opacity:1;
    }
    100%{
        transform:translateY(-110vh);
        opacity:0;
    }
}
</style>

</head>

<body>

<div class="container">

<h1>🎂 Happy Birthday 💗</h1>

<h2>MR MAHAD</h2>

<p>
May Allah always bless you with happiness,<br>
success and endless smiles. ❤️✨
</p>

<div class="line">
Have the most beautiful birthday ever 💗♾️
</div>

</div>


<div class="heart" style="left:10%;animation-delay:0s;">💗</div>
<div class="heart" style="left:25%;animation-delay:2s;">❤️</div>
<div class="heart" style="left:40%;animation-delay:4s;">💖</div>
<div class="heart" style="left:60%;animation-delay:1s;">💗</div>
<div class="heart" style="left:75%;animation-delay:3s;">❤️</div>
<div class="heart" style="left:90%;animation-delay:5s;">💖</div>

</body>
</html>
