<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Happy Birthday MR MAHAD 💗</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
height:100vh;
background:linear-gradient(135deg,#000,#420015,#ff4d6d);
color:white;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
}

.container{
text-align:center;
z-index:2;
animation:show 2s ease;
}

h1{
font-size:55px;
text-shadow:0 0 20px white;
}

h2{
font-size:40px;
margin:15px;
}

.slider{
width:300px;
height:300px;
margin:20px auto;
border-radius:25px;
overflow:hidden;
box-shadow:0 0 30px white;
}

.slider img{
width:100%;
height:100%;
object-fit:cover;
animation:change 15s infinite;
}

@keyframes change{
0%{content:url("image.png");}
20%{content:url("image2.png");}
40%{content:url("image3.png");}
60%{content:url("image4.png");}
80%{content:url("image5.png");}
100%{content:url("image.png");}
}

p{
font-size:20px;
line-height:1.6;
}

.heart{
position:absolute;
bottom:-50px;
font-size:35px;
animation:up 7s linear infinite;
}

@keyframes up{
0%{
transform:translateY(0);
opacity:1;
}
100%{
transform:translateY(-110vh);
opacity:0;
}
}

@keyframes show{
from{
opacity:0;
transform:scale(.5);
}
to{
opacity:1;
transform:scale(1);
}
}

</style>
</head>

<body>

<div class="container">

<h1>🎂 Happy Birthday 💗</h1>

<h2>MR MAHAD</h2>

<div class="slider">
<img src="image.png">
</div>

<p>
May Allah always bless you with happiness,<br>
success and endless smiles. ❤️✨
</p>

<p>
Have the most beautiful birthday ever 💗♾️
</p>

</div>

<div class="heart" style="left:10%">💗</div>
<div class="heart" style="left:30%;animation-delay:2s">❤️</div>
<div class="heart" style="left:50%;animation-delay:4s">💖</div>
<div class="heart" style="left:70%;animation-delay:1s">💗</div>
<div class="heart" style="left:90%;animation-delay:3s">❤️</div>

</body>
</html>
