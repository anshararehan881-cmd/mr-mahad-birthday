<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Happy Birthday MR MAHAD 💗</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
height:100vh;
background:linear-gradient(135deg,#000,#4a0014,#ff4d6d);
color:white;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
}

.container{
text-align:center;
animation:show 2s ease;
z-index:2;
}

h1{
font-size:50px;
text-shadow:0 0 20px white;
}

h2{
font-size:40px;
margin:15px;
}

p{
font-size:20px;
line-height:1.5;
}

.slider{
margin:25px auto;
width:300px;
height:300px;
border-radius:25px;
overflow:hidden;
box-shadow:0 0 25px white;
}

.slider img{
width:100%;
height:100%;
object-fit:cover;
animation:slide 10s infinite;
}

@keyframes slide{
0%{content:url("pic1.jpg");}
25%{content:url("pic2.jpg");}
50%{content:url("pic3.jpg");}
75%{content:url("pic4.jpg");}
100%{content:url("pic5.jpg");}
}

.heart{
position:absolute;
bottom:-40px;
font-size:30px;
animation:up 7s linear infinite;
}

@keyframes up{
from{
transform:translateY(0);
opacity:1;
}
to{
transform:translateY(-110vh);
opacity:0;
}
}

@keyframes show{
from{
opacity:0;
transform:scale(.5);
}
to{
opacity:1;
transform:scale(1);
}
}

</style>
</head>

<body>

<div class="container">

<h1>🎂 Happy Birthday 💗</h1>

<h2>MR MAHAD</h2>

<div class="slider">
<img src="pic1.jpg">
</div>

<p>
May Allah always bless you with happiness,<br>
success and endless smiles. ❤️✨
</p>

<p>
Have the most beautiful birthday ever 💗♾️
</p>

</div>

<div class="heart" style="left:10%">💗</div>
<div class="heart" style="left:30%;animation-delay:2s">❤️</div>
<div class="heart" style="left:50%;animation-delay:4s">💖</div>
<div class="heart" style="left:70%;animation-delay:1s">💗</div>
<div class="heart" style="left:90%;animation-delay:3s">❤️</div>

</body>
</html>
